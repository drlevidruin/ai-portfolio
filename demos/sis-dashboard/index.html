<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pardes SIS Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     Pardes SIS — static port matching the live React app.
     Brand colors, Montserrat headings, DM Sans body.
     ============================================================ */
  :root {
    --navy: #343e85;
    --navy-light: #4a5298;
    --navy-dark: #2a3270;
    --green: #10653c;
    --green-light: #148a4f;
    --brown: #5e3b1d;
    --offwhite: #f8f9fc;
    --warning: #d97706;
    --danger: #dc2626;
    --text-primary: #1a1a2e;
    --text-secondary: #6b7280;
    --gray-50: #f9fafb;
    --gray-100: #f3f4f6;
    --gray-200: #e5e7eb;
    --gray-300: #d1d5db;
    --gray-400: #9ca3af;
    --gray-500: #6b7280;
    --gray-600: #4b5563;
    --gray-700: #374151;
    --gray-800: #1f2937;
    --gray-900: #111827;
    --emerald-50: #ecfdf5;
    --emerald-500: #10b981;
    --emerald-600: #059669;
    --emerald-700: #047857;
    --red-50: #fef2f2;
    --red-100: #fee2e2;
    --red-500: #ef4444;
    --red-600: #dc2626;
    --red-700: #b91c1c;
    --yellow-50: #fefce8;
    --yellow-100: #fef9c3;
    --yellow-500: #eab308;
    --yellow-700: #a16207;
    --yellow-800: #854d0e;
    --amber-100: #fef3c7;
    --amber-800: #92400e;
    --blue-50: #eff6ff;
    --blue-400: #60a5fa;
    --blue-500: #3b82f6;
    --pink-400: #f472b6;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
    background-color: var(--offwhite);
    color: var(--text-primary);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    min-height: 100vh;
  }
  h1, h2, h3, h4, h5, h6 {
    font-family: 'Montserrat', sans-serif;
    margin: 0;
    color: var(--gray-900);
  }
  button { font-family: inherit; cursor: pointer; border: none; background: none; padding: 0; }
  input, textarea { font-family: inherit; }
  a { color: inherit; text-decoration: none; }

  ::selection { background-color: rgba(52, 62, 133, 0.15); }
  :focus-visible { outline: 2px solid var(--navy); outline-offset: 2px; border-radius: 4px; }

  /* ----------- Layout ----------- */
  .app-shell { min-height: 100vh; background: var(--offwhite); }
  .sidebar {
    position: fixed; left: 0; top: 0; bottom: 0;
    width: 240px; z-index: 40;
    background: linear-gradient(180deg, #343e85 0%, #2a3270 60%, #1e2654 100%);
    display: flex; flex-direction: column;
  }
  .sidebar-logo {
    padding: 20px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    display: flex; align-items: center; gap: 12px;
  }
  .sidebar-logo-icon {
    width: 40px; height: 40px;
    background: rgba(255,255,255,0.95);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 6px 14px rgba(0,0,0,0.18);
    color: var(--green);
    font-family: 'Montserrat', sans-serif;
    font-weight: 800; font-size: 18px;
  }
  .sidebar-logo h2 {
    color: white; font-size: 13px; font-weight: 700;
    letter-spacing: 0.04em;
  }
  .sidebar-logo p { color: rgba(255,255,255,0.4); font-size: 11px; margin: 0; }
  .sidebar-nav {
    flex: 1; padding: 16px 12px; overflow-y: auto;
  }
  .sidebar-nav-item {
    width: 100%; display: flex; align-items: center; gap: 12px;
    padding: 10px 12px; border-radius: 12px; margin-bottom: 2px;
    font-size: 14px; font-weight: 500;
    color: rgba(255,255,255,0.6);
    transition: all 0.15s ease; text-align: left;
  }
  .sidebar-nav-item:hover { background: rgba(255,255,255,0.08); color: white; }
  .sidebar-nav-item.active {
    background: rgba(255,255,255,0.15); color: white;
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    border-left: 3px solid var(--green);
    padding-left: 9px;
  }
  .sidebar-nav-item svg { flex-shrink: 0; }
  .sidebar-user {
    padding: 16px; border-top: 1px solid rgba(255,255,255,0.1);
    background: rgba(0,0,0,0.1);
  }
  .sidebar-user-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .sidebar-user-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--green);
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 12px; font-weight: 700;
    box-shadow: 0 4px 6px rgba(0,0,0,0.18);
  }
  .sidebar-user-name { color: white; font-size: 13px; font-weight: 600; }
  .sidebar-user-role { color: rgba(255,255,255,0.4); font-size: 11px; text-transform: capitalize; }
  .sidebar-signout {
    width: 100%; display: flex; align-items: center; gap: 8px;
    padding: 8px 12px; border-radius: 12px;
    color: rgba(255,255,255,0.5);
    font-size: 13px; transition: all 0.15s ease; text-align: left;
  }
  .sidebar-signout:hover { color: white; background: rgba(255,255,255,0.1); }

  .main-area { margin-left: 240px; }
  .topbar {
    position: sticky; top: 0; z-index: 30;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(6px);
    border-bottom: 1px solid var(--gray-200);
    height: 56px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px;
  }
  .topbar h1 {
    font-size: 18px; font-weight: 700; color: var(--gray-900);
  }
  .topbar-right { display: flex; align-items: center; gap: 10px; }
  .topbar-name { font-size: 12px; color: var(--gray-400); }

  .back-portfolio {
    font-size: 12px; font-weight: 600; color: var(--green);
    display: inline-flex; align-items: center; gap: 4px;
    margin-right: 18px;
  }
  .back-portfolio:hover { text-decoration: underline; }

  main.page {
    padding: 24px;
    padding-bottom: 60px;
    max-width: 1152px;
    margin: 0 auto;
    animation: fade-in 0.2s ease-out;
  }

  /* ----------- Reusable components ----------- */
  .card {
    background: white;
    border: 1px solid var(--gray-100);
    border-radius: 16px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    padding: 24px;
    transition: box-shadow 0.2s ease;
  }
  .card-hover { cursor: pointer; }
  .card-hover:hover {
    box-shadow: 0 4px 6px rgba(0,0,0,0.07), 0 2px 4px rgba(0,0,0,0.04);
    border-color: var(--gray-200);
  }
  .card-hover:active { transform: scale(0.99); }
  .card-padding-sm { padding: 16px; }

  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .card-header-title { font-size: 18px; font-weight: 600; color: var(--gray-900); }
  .card-header-subtitle { font-size: 14px; color: var(--gray-500); margin-top: 2px; }

  .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
  .page-header h1 { font-size: 24px; font-weight: 700; color: var(--gray-900); }
  .page-header p { font-size: 14px; color: var(--gray-500); margin: 2px 0 0; }

  .badge {
    display: inline-flex; align-items: center;
    padding: 2px 10px;
    border-radius: 999px;
    font-size: 12px; font-weight: 500;
  }
  .badge-navy { background: rgba(52,62,133,0.10); color: var(--navy); }
  .badge-green { background: rgba(16,101,60,0.10); color: var(--green); }
  .badge-brown { background: var(--amber-100); color: var(--amber-800); }
  .badge-red { background: var(--red-100); color: var(--red-700); }
  .badge-yellow { background: var(--yellow-100); color: var(--yellow-800); }
  .badge-gray { background: var(--gray-100); color: var(--gray-600); }

  .btn {
    display: inline-flex; align-items: center; justify-content: center;
    gap: 8px; font-weight: 500; border-radius: 8px;
    padding: 8px 16px; font-size: 14px;
    transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
  }
  .btn-primary { background: var(--navy); color: white; }
  .btn-primary:hover { background: var(--navy-dark); }
  .btn-secondary { background: white; color: var(--gray-700); border: 1px solid var(--gray-300); }
  .btn-secondary:hover { background: var(--gray-50); }
  .btn-ghost { background: transparent; color: var(--gray-600); }
  .btn-ghost:hover { background: var(--gray-100); }
  .btn-sm { padding: 6px 12px; font-size: 13px; }
  .btn-justify-start { justify-content: flex-start; }

  /* Stat card */
  .stat-card {
    display: flex; flex-direction: column; align-items: flex-start; gap: 8px;
    cursor: pointer;
  }
  .stat-icon {
    padding: 8px; border-radius: 8px;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .stat-icon-navy { background: rgba(52,62,133,0.10); color: var(--navy); }
  .stat-icon-green { background: rgba(16,101,60,0.10); color: var(--green); }
  .stat-icon-brown { background: var(--amber-100); color: var(--amber-800); }
  .stat-icon-gray { background: var(--gray-100); color: var(--gray-600); }
  .stat-value { font-family: 'Montserrat', sans-serif; font-size: 24px; font-weight: 700; color: var(--gray-900); line-height: 1.1; }
  .stat-label { font-size: 12px; color: var(--gray-500); margin-top: 2px; }

  /* Grids */
  .grid-stats {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px;
    margin-bottom: 24px;
  }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }

  @media (max-width: 768px) {
    .grid-stats { grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .grid-3 { grid-template-columns: 1fr; }
    .grid-2 { grid-template-columns: 1fr; }
  }

  /* Staff status widget */
  .status-bar {
    display: flex; height: 12px;
    border-radius: 999px; overflow: hidden;
    background: var(--gray-100);
    margin-bottom: 16px;
  }
  .status-bar > div { transition: all 0.4s ease; }
  .status-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 8px; border-radius: 8px;
  }
  .status-row:hover { background: var(--gray-50); }
  .status-row-left { display: flex; align-items: center; gap: 8px; min-width: 0; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .status-name { font-size: 14px; color: var(--gray-800); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .status-row-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .status-time { font-size: 12px; color: var(--gray-500); }
  .status-label { font-size: 12px; font-weight: 500; }

  /* Quick actions */
  .quick-actions-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }

  /* Birthday */
  .birthday-row {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 8px; border-radius: 8px;
    background: var(--yellow-50);
    margin-bottom: 8px;
  }
  .birthday-row svg { color: var(--yellow-500); flex-shrink: 0; }
  .birthday-row .name { font-size: 14px; font-weight: 500; color: var(--gray-800); }
  .birthday-row .badge { margin-left: auto; }

  /* Gender */
  .gender-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px;
  }
  .gender-row:last-child { margin-bottom: 0; }
  .gender-row-left { display: flex; align-items: center; gap: 8px; }
  .gender-dot { width: 12px; height: 12px; border-radius: 50%; }
  .gender-male { background: var(--blue-400); }
  .gender-female { background: var(--pink-400); }
  .gender-label { font-size: 14px; color: var(--gray-700); }
  .gender-count { font-size: 14px; font-weight: 600; color: var(--gray-900); }

  /* Search */
  .searchbar {
    position: relative; width: 100%; margin-bottom: 12px;
  }
  .searchbar svg.icon-search {
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    color: var(--gray-400);
  }
  .searchbar input {
    width: 100%;
    padding: 10px 40px;
    border: 1px solid var(--gray-300);
    border-radius: 8px;
    font-size: 16px;
    background: white;
    outline: none;
    transition: all 0.15s ease;
  }
  .searchbar input:focus {
    border-color: var(--navy);
    box-shadow: 0 0 0 2px rgba(52,62,133,0.2);
  }

  /* Grade filter pills */
  .grade-filter-wrap { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
  .grade-divisions { display: flex; flex-wrap: wrap; gap: 8px; }
  .grade-pill {
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 12px; font-weight: 500;
    background: var(--gray-100);
    color: var(--gray-600);
    transition: background 0.15s ease;
  }
  .grade-pill:hover { background: var(--gray-200); }
  .grade-pill.active { background: var(--navy); color: white; }
  .grade-pills {
    display: grid; grid-template-columns: repeat(10, 1fr); gap: 6px;
  }
  .grade-pill-sm {
    padding: 8px 4px;
    border-radius: 8px;
    font-size: 12px; font-weight: 500;
    text-align: center;
    background: var(--gray-100);
    color: var(--gray-600);
    transition: background 0.15s ease;
  }
  .grade-pill-sm:hover { background: var(--gray-200); }
  .grade-pill-sm.active { background: var(--navy); color: white; }
  @media (max-width: 768px) { .grade-pills { grid-template-columns: repeat(5, 1fr); } }

  /* Table */
  .table-wrap { overflow-x: auto; }
  .data-table { width: 100%; font-size: 14px; border-collapse: collapse; }
  .data-table thead tr { border-bottom: 1px solid var(--gray-200); }
  .data-table th {
    padding: 12px 16px;
    text-align: left;
    font-weight: 600;
    color: var(--gray-600);
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
  }
  .data-table th:hover { color: var(--gray-900); }
  .data-table th svg { vertical-align: middle; color: var(--gray-300); }
  .data-table tbody tr {
    border-bottom: 1px solid var(--gray-100);
    cursor: pointer;
    transition: background 0.1s ease;
  }
  .data-table tbody tr:hover { background: var(--gray-50); }
  .data-table td { padding: 12px 16px; }
  .data-table .name-cell { font-weight: 500; color: var(--gray-900); }

  /* Login screen */
  .login-screen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 16px; position: relative; overflow: hidden;
    background: linear-gradient(135deg, #343e85 0%, #2a3270 40%, #10653c 100%);
  }
  .login-blob {
    position: absolute; border-radius: 50%; background: rgba(255,255,255,0.05);
    pointer-events: none;
  }
  .login-blob.b1 { top: -96px; right: -96px; width: 384px; height: 384px; }
  .login-blob.b2 { bottom: -128px; left: -128px; width: 500px; height: 500px; }
  .login-blob.b3 { top: 33%; right: 25%; width: 256px; height: 256px; background: rgba(255,255,255,0.03); }

  .login-card {
    width: 100%; max-width: 384px; position: relative; z-index: 10;
  }
  .login-logo {
    text-align: center; margin-bottom: 32px;
  }
  .login-logo-box {
    width: 128px; height: 128px; margin: 0 auto 16px;
    background: white; border-radius: 16px;
    box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
    display: flex; align-items: center; justify-content: center;
    color: var(--green);
    font-family: 'Montserrat', sans-serif;
    font-weight: 800; font-size: 56px;
  }
  .login-logo h1 { color: white; font-size: 24px; font-weight: 700; }
  .login-logo p { color: rgba(255,255,255,0.6); font-size: 14px; margin: 4px 0 0; }

  .login-box {
    background: white;
    border-radius: 16px;
    box-shadow: 0 25px 50px -12px rgba(0,0,0,0.4);
    padding: 32px;
  }
  .login-box h2 {
    font-size: 20px; font-weight: 700;
    text-align: center; margin-bottom: 8px;
  }
  .login-box .subtitle {
    text-align: center; color: var(--gray-500); font-size: 14px; margin-bottom: 24px;
  }
  .role-button {
    width: 100%;
    display: flex; align-items: center; gap: 14px;
    padding: 16px;
    border: 2px solid var(--gray-200);
    border-radius: 14px;
    background: var(--gray-50);
    margin-bottom: 12px;
    transition: all 0.15s ease;
    text-align: left;
  }
  .role-button:hover {
    border-color: var(--navy);
    background: white;
    box-shadow: 0 4px 8px rgba(52,62,133,0.12);
  }
  .role-button .role-avatar {
    width: 44px; height: 44px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    color: white; flex-shrink: 0;
  }
  .role-button.admin .role-avatar { background: var(--navy); }
  .role-button.teacher .role-avatar { background: var(--green); }
  .role-button .role-info { flex: 1; }
  .role-button .role-info .title { font-weight: 700; color: var(--gray-900); font-size: 15px; }
  .role-button .role-info .desc { font-size: 12px; color: var(--gray-500); margin-top: 2px; }
  .role-button .role-arrow { color: var(--gray-400); }

  .login-footer { text-align: center; color: rgba(255,255,255,0.4); font-size: 12px; margin-top: 24px; }

  .login-back {
    position: absolute; top: 16px; left: 16px;
    color: white; font-size: 12px; font-weight: 600;
    display: inline-flex; align-items: center; gap: 4px;
    padding: 8px 12px; border-radius: 8px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(4px);
    z-index: 11;
  }
  .login-back:hover { background: rgba(255,255,255,0.15); }

  /* Ask SIS card */
  .ask-card {
    background: linear-gradient(135deg, rgba(52,62,133,0.04), rgba(16,101,60,0.04));
    border: 1px solid rgba(52,62,133,0.15);
    border-radius: 16px;
    padding: 18px 20px;
    margin-bottom: 24px;
  }
  .ask-card label {
    display: flex; align-items: center; gap: 8px;
    font-size: 11px; font-weight: 700;
    color: var(--navy); text-transform: uppercase; letter-spacing: 0.08em;
    margin-bottom: 10px;
  }
  .ask-input-row {
    display: flex; gap: 8px;
  }
  .ask-input-row input {
    flex: 1;
    padding: 10px 14px;
    border: 1px solid var(--gray-200);
    border-radius: 10px;
    font-size: 14px;
    background: white;
    outline: none;
  }
  .ask-input-row input:focus { border-color: var(--navy); box-shadow: 0 0 0 2px rgba(52,62,133,0.15); }
  .ask-response {
    margin-top: 14px;
    padding: 14px 16px;
    background: white;
    border: 1px solid var(--gray-200);
    border-radius: 10px;
    font-size: 14px;
    color: var(--gray-700);
    line-height: 1.55;
    animation: fade-in 0.25s ease-out;
  }
  .ask-response strong { color: var(--navy); }

  /* Profile */
  .profile-back {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 14px; color: var(--gray-500);
    margin-bottom: 20px;
  }
  .profile-back:hover { color: var(--navy); }

  .profile-header {
    display: flex; align-items: flex-start; gap: 16px;
    margin-bottom: 20px;
  }
  .profile-avatar {
    width: 80px; height: 80px;
    border-radius: 50%;
    background: var(--navy);
    display: flex; align-items: center; justify-content: center;
    color: white; font-family: 'Montserrat', sans-serif;
    font-weight: 700; font-size: 28px;
    box-shadow: 0 6px 12px rgba(52,62,133,0.3);
    flex-shrink: 0;
  }
  .profile-name {
    font-size: 26px; font-weight: 700;
    color: var(--gray-900);
    margin-bottom: 6px;
  }
  .profile-meta-row {
    display: flex; flex-wrap: wrap; gap: 8px;
  }

  /* Tabs */
  .tab-bar {
    display: inline-flex; gap: 4px;
    background: var(--gray-100);
    padding: 4px;
    border-radius: 8px;
    margin-bottom: 20px;
  }
  .tab-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 14px;
    border-radius: 6px;
    font-size: 13px; font-weight: 500;
    color: var(--gray-600);
    transition: all 0.15s ease;
    white-space: nowrap;
  }
  .tab-btn:hover { color: var(--gray-900); background: var(--gray-200); }
  .tab-btn.active {
    background: var(--navy);
    color: white;
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
  }

  /* Progress bar */
  .progress-track {
    height: 8px; background: var(--gray-100);
    border-radius: 999px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; border-radius: 999px;
    background: var(--green-light);
    transition: width 0.5s ease;
  }
  .progress-label-row {
    display: flex; align-items: center; justify-content: space-between;

  if (page !== 'dashboard') state.askResponse = null;
  render();
  window.scrollTo({ top: 0, behavior: 'instant' });
}

function setRole(role) {
  state.role = role;
  state.page = 'dashboard';
  render();
}

function render() {
  const root = document.getElementById('app');
  if (state.page === 'login') {
    root.innerHTML = renderLogin();
  } else {
    root.innerHTML = renderShell(renderPage());
  }
  attachListeners();
}

// ----------- ASK SIS RESPONSE -----------
function askResponse(query) {
  const q = (query || '').toLowerCase();
  // Match a student
  for (const s of STUDENTS) {
    if (q.includes(s.first.toLowerCase()) || q.includes(s.last.toLowerCase())) {
      return `
        <strong>${s.first} ${s.last} · 2nd Grade</strong><br>
        ${s.aiSummary}
        <br><br>
        <em style="font-size:12px; color:var(--gray-500);">Synthesized from Master DB, Attendance V2, Waggle, and Mrs. Levi's observations.</em>
      `;
    }
  }
  if (q.includes('absent') || q.includes('missing')) {
    return `<strong>1 student absent today.</strong><br>Dalet Goldberg (2nd Grade · Goldberg family) — mom called in this morning, cold, expected back Monday.`;
  }
  if (q.includes('birthday')) {
    return `<strong>Alef Cohen turns 8 today!</strong> 2nd Grade. Mrs. Levi planned a small classroom birthday circle at 10:30a.`;
  }
  if (q.includes('attend')) {
    return `<strong>Attendance today: 106 of 115 students here</strong> (92%). 7 absent, 2 tardy. Worst grade by attendance % is PK2 (90%).`;
  }
  if (q.includes('staff') || q.includes('late')) {
    return `<strong>2 staff arrived late this morning.</strong> Mrs. Mizrahi (8:14a, +14 min) and Mr. Cohen (8:21a, +21 min). 18 staff on time, 2 working remote, 2 absent.`;
  }
  if (q.trim()) {
    return `I found <strong>3 students matching "${query}"</strong>: Alef Cohen (2nd), Bet Levi (2nd), Gimmel Friedman (2nd). Click any student to see their full profile, or refine your question.`;
  }
  return `Try asking about a specific student, today's attendance, or staff status.`;
}

// ----------- EVENT LISTENERS -----------
function attachListeners() {
  // Sidebar nav
  document.querySelectorAll('[data-page]').forEach(el => {
    el.addEventListener('click', e => {
      e.preventDefault();
      e.stopPropagation();
      const page = el.dataset.page;
      navigate(page);
    });
  });

  // Login
  document.querySelectorAll('[data-action="login-admin"]').forEach(el =>
    el.addEventListener('click', () => setRole('admin')));
  document.querySelectorAll('[data-action="login-teacher"]').forEach(el =>
    el.addEventListener('click', () => setRole('teacher')));

  // Sign out
  document.querySelectorAll('[data-action="logout"]').forEach(el =>
    el.addEventListener('click', () => { state.page = 'login'; render(); }));

  // Back to portfolio
  document.querySelectorAll('[data-action="portfolio-back"]').forEach(el =>
    el.addEventListener('click', e => {
      e.preventDefault();
      if (history.length > 1 && document.referrer) history.back();
      else window.location.href = '../../index.html';
    }));

  // Student row click
  document.querySelectorAll('[data-student]').forEach(el =>
    el.addEventListener('click', e => {
      e.preventDefault();
      e.stopPropagation();
      navigate('profile', { studentId: el.dataset.student });
    }));

  // Profile tabs
  document.querySelectorAll('[data-tab]').forEach(el =>
    el.addEventListener('click', e => {
      e.preventDefault();
      state.studentTab = el.dataset.tab;
      render();
    }));

  // Search
  const searchInput = document.getElementById('student-search');
  if (searchInput) {
    searchInput.addEventListener('input', e => {
      state.searchQuery = e.target.value;
      // re-render only the table portion would be smoother but full render is simple enough
      render();
      // restore focus and caret
      setTimeout(() => {
        const i = document.getElementById('student-search');
        if (i) { i.focus(); i.setSelectionRange(state.searchQuery.length, state.searchQuery.length); }
      }, 0);
    });
  }

  // Grade pills
  document.querySelectorAll('[data-grade]').forEach(el =>
    el.addEventListener('click', e => {
      e.preventDefault();
      const g = el.dataset.grade;
      state.selectedGrade = (g && state.selectedGrade !== g) ? g : null;
      render();
    }));

  // Ask SIS
  document.querySelectorAll('[data-action="ask-submit"]').forEach(el =>
    el.addEventListener('click', e => {
      e.preventDefault();
      const input = document.getElementById('ask-input');
      const q = input ? input.value.trim() : '';
      state.askResponse = askResponse(q);
      render();
      // restore focus
      setTimeout(() => {
        const i = document.getElementById('ask-input');
        if (i) { i.focus(); i.value = q; }
      }, 0);
    }));

  const askInput = document.getElementById('ask-input');
  if (askInput) {
    askInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const q = askInput.value.trim();
        state.askResponse = askResponse(q);
        render();
        setTimeout(() => {
          const i = document.getElementById('ask-input');
          if (i) { i.focus(); i.value = q; }
        }, 0);
      }
    });
  }
}

// ----------- BOOT -----------
render();
</script>
