<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pardes Day School &middot; Parent-Teacher Conferences (Demo)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f0f2f5;
      color: #1a1a1a;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* Back-to-portfolio link sits above header */
    .portfolio-bar {
      background: #f0f2f5;
      padding: 10px 16px 0;
      max-width: 500px;
      margin: 0 auto;
    }
    .portfolio-bar a {
      font-size: 12px;
      font-weight: 600;
      color: #006B3F;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .portfolio-bar a:hover { text-decoration: underline; }
    .demo-badge {
      display: inline-block;
      margin-left: 10px;
      font-size: 10px;
      font-weight: 700;
      color: #b45309;
      background: #fffbeb;
      border: 1px solid #fde68a;
      padding: 2px 8px;
      border-radius: 999px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      vertical-align: middle;
    }

    .header {
      background: linear-gradient(135deg, #006B3F 0%, #004d2d 100%);
      color: white;
      padding: 20px 20px 24px;
      text-align: center;
    }

    .header h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .header .subtitle {
      font-size: 14px;
      font-weight: 400;
      opacity: 0.8;
      margin-top: 4px;
    }

    .logo-badge {
      background: white;
      display: inline-block;
      padding: 8px 12px;
      border-radius: 10px;
      margin-bottom: 8px;
    }

    .logo-text {
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: #006B3F;
      font-size: 18px;
      letter-spacing: -0.4px;
      padding: 0 8px;
    }
    .logo-text .star {
      color: #006B3F;
      margin-right: 6px;
      font-size: 22px;
    }

    .container {
      max-width: 500px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    .screen { display: none; }
    .screen.active { display: block; }

    /* Cards */
    .card {
      background: white;
      border-radius: 16px;
      padding: 28px 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .card-title {
      font-size: 22px;
      font-weight: 700;
      color: #006B3F;
      text-align: center;
      margin-bottom: 24px;
    }

    /* Fields */
    .field { margin-bottom: 18px; }

    .field label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #666;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .field input {
      width: 100%;
      padding: 16px;
      font-size: 17px;
      font-family: 'Montserrat', sans-serif;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      background: #fafafa;
    }

    .field input:focus {
      border-color: #006B3F;
      box-shadow: 0 0 0 3px rgba(0,107,63,0.1);
      background: white;
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 24px;
      font-size: 15px;
      font-weight: 600;
      font-family: 'Montserrat', sans-serif;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      min-height: 50px;
      transition: opacity 0.15s, transform 0.15s, background 0.15s;
    }

    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn:active:not(:disabled) { transform: scale(0.98); }

    .btn-primary {
      background: #006B3F;
      color: white;
      width: 100%;
      font-size: 16px;
    }
    .btn-primary:hover:not(:disabled) { background: #005a34; }

    .btn-book {
      background: #006B3F;
      color: white;
      padding: 10px 20px;
      font-size: 14px;
      min-height: 44px;
    }
    .btn-book:hover:not(:disabled) { background: #005a34; }

    .btn-cancel {
      background: #fee;
      color: #c00;
      padding: 10px 14px;
      font-size: 13px;
      min-height: 44px;
      border: 1px solid #fcc;
    }
    .btn-cancel:hover:not(:disabled) { background: #fdd; }

    .btn-resched {
      background: #f0f7ff;
      color: #0066cc;
      padding: 10px 14px;
      font-size: 13px;
      min-height: 44px;
      border: 1px solid #cce0ff;
    }
    .btn-resched:hover:not(:disabled) { background: #e0efff; }

    .btn-outline {
      background: white;
      color: #333;
      border: 2px solid #ddd;
      padding: 12px 24px;
    }

    .btn-danger-solid {
      background: #dc3545;
      color: white;
      padding: 12px 24px;
    }

    /* Alerts */
    .alert-error {
      background: #fef2f2;
      color: #b91c1c;
      padding: 14px 18px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      border: 1px solid #fecaca;
      text-align: center;
      display: none;
    }
    .alert-error.visible { display: block; }

    /* Demo helpers shown subtly under login */
    .demo-shortcut {
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px dashed #e0e0e0;
      text-align: center;
    }
    .demo-shortcut .label {
      font-size: 11px;
      font-weight: 700;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 10px;
    }
    .demo-shortcut button {
      background: #f0faf5;
      color: #006B3F;
      border: 1px solid #b7e2c6;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 600;
      font-family: 'Montserrat', sans-serif;
      cursor: pointer;
      width: 100%;
      margin-bottom: 6px;
      min-height: 42px;
      transition: background 0.15s;
    }
    .demo-shortcut button:hover { background: #e0f4e8; }

    /* Dashboard */
    .welcome {
      font-size: 24px;
      color: #006B3F;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .welcome-sub {
      font-size: 14px;
      color: #888;
      margin-bottom: 24px;
    }

    .child-card {
      background: white;
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .child-header {
      background: #f8faf9;
      padding: 16px 20px;
      border-bottom: 1px solid #eee;
    }

    .child-name {
      font-size: 17px;
      font-weight: 700;
      color: #1a1a1a;
    }

    .child-grade {
      font-size: 13px;
      color: #888;
      font-weight: 500;
      margin-top: 2px;
    }

    .teacher-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid #f0f0f0;
      gap: 12px;
    }
    .teacher-row:last-child { border-bottom: none; }

    .teacher-info { flex: 1; min-width: 0; }

    .teacher-name {
      font-size: 15px;
      font-weight: 600;
      color: #333;
    }

    .booked-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 13px;
      color: #006B3F;
      font-weight: 600;
      margin-top: 4px;
    }
    .booked-badge::before {
      content: '\2713';
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 18px;
      background: #006B3F;
      color: white;
      border-radius: 50%;
      font-size: 11px;
    }

    .booking-actions {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }

    /* Teacher section */
    .section-title {
      font-size: 16px;
      font-weight: 700;
      color: #006B3F;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin: 28px 0 12px;
      padding-bottom: 6px;
      border-bottom: 2px solid #e8f5ee;
    }

    .teacher-booking-card {
      background: white;
      border-radius: 12px;
      padding: 16px 18px;
      margin-bottom: 10px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.05);
      border-left: 4px solid #006B3F;
    }
    .tb-when {
      font-size: 13px;
      font-weight: 700;
      color: #006B3F;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    .tb-student {
      font-size: 16px;
      font-weight: 700;
      color: #1a1a1a;
      margin-top: 4px;
    }
    .tb-family {
      font-size: 13px;
      color: #666;
      margin-top: 2px;
    }
    .tb-meta {
      font-size: 13px;
      color: #444;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #f0f0f0;
    }
    .tb-meta div { margin-top: 3px; }
    .tb-meta .label { color: #888; font-weight: 500; display: inline-block; min-width: 60px; }

    .tb-note {
      background: #f8faf9;
      border-left: 3px solid #006B3F;
      padding: 8px 12px;
      border-radius: 0 6px 6px 0;
      margin-top: 10px;
      font-size: 13px;
      color: #333;
    }

    .tb-format-inperson {
      display: inline-block;
      background: #fffbeb;
      color: #b45309;
      border: 1px solid #fde68a;
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
      margin-left: 6px;
      vertical-align: middle;
    }

    /* Admin */
    .admin-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 8px;
      margin-bottom: 16px;
    }
    .admin-stat-card {
      background: white;
      padding: 14px 12px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }
    .admin-stat-num {
      font-size: 22px;
      font-weight: 700;
      color: #006B3F;
    }
    .admin-stat-label {
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-top: 2px;
    }
    .admin-day-header {
      font-size: 14px;
      font-weight: 700;
      color: #006B3F;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin: 20px 0 10px;
      padding: 10px 14px;
      background: #f0faf5;
      border-radius: 10px;
      border-left: 4px solid #006B3F;
    }
    .admin-booking {
      background: white;
      padding: 12px 16px;
      margin-bottom: 6px;
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
      font-size: 13px;
      line-height: 1.5;
    }
    .admin-booking .row1 {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
    }
    .admin-booking .time {
      font-weight: 700;
      color: #006B3F;
      font-size: 14px;
      white-space: nowrap;
    }
    .admin-booking .teacher {
      font-weight: 600;
      color: #333;
    }
    .admin-booking .details {
      color: #555;
      margin-top: 4px;
    }
    .admin-booking .details .label {
      color: #888;
      font-size: 12px;
    }
    .admin-note {
      background: #f8faf9;
      border-left: 3px solid #006B3F;
      padding: 6px 10px;
      border-radius: 0 6px 6px 0;
      margin-top: 6px;
      font-size: 12px;
      color: #333;
    }

    .empty-teacher {
      text-align: center;
      padding: 20px;
      color: #888;
      font-size: 14px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.05);
    }

    .signout {
      text-align: center;
      margin-top: 28px;
    }
    .signout button {
      color: #999;
      font-size: 14px;
      background: none;
      border: none;
      cursor: pointer;
      font-weight: 500;
      padding: 8px 16px;
      min-height: 44px;
      font-family: 'Montserrat', sans-serif;
    }
    .signout button:hover { color: #555; }

    /* Slot picker */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #006B3F;
      font-size: 14px;
      font-weight: 600;
      background: none;
      border: none;
      cursor: pointer;
      margin-bottom: 20px;
      padding: 8px 0;
      min-height: 44px;
      font-family: 'Montserrat', sans-serif;
    }

    .picker-header { margin-bottom: 24px; }
    .picker-title {
      font-size: 20px;
      font-weight: 700;
      color: #1a1a1a;
    }
    .picker-subtitle {
      font-size: 14px;
      color: #888;
      margin-top: 4px;
    }

    .date-group { margin-bottom: 24px; }
    .date-label {
      font-size: 13px;
      font-weight: 700;
      color: #006B3F;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 2px solid #e8f5ee;
    }

    .slots-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
      gap: 8px;
    }

    .slot-btn {
      padding: 14px 8px;
      font-size: 15px;
      font-weight: 600;
      font-family: 'Montserrat', sans-serif;
      background: white;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      color: #333;
      cursor: pointer;
      min-height: 48px;
      text-align: center;
      transition: opacity 0.15s, transform 0.15s, border-color 0.15s, background 0.15s;
    }
    .slot-btn:hover:not(:disabled) {
      border-color: #006B3F;
      background: #f0faf5;
      color: #006B3F;
    }
    .slot-btn:active:not(:disabled) { transform: scale(0.96); }
    .slot-btn.selected {
      background: #006B3F;
      color: white;
      border-color: #006B3F;
    }
    .slot-btn:disabled {
      background: #f5f5f5;
      color: #bbb;
      border-color: #eee;
      cursor: not-allowed;
      text-decoration: line-through;
    }

    .confirm-panel {
      background: white;
      border-radius: 16px;
      padding: 24px;
      margin-top: 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      border: 2px solid #006B3F;
    }
    .confirm-panel h3 {
      font-size: 17px;
      font-weight: 700;
      color: #006B3F;
      margin-bottom: 16px;
    }
    .confirm-detail {
      font-size: 14px;
      color: #555;
      margin-bottom: 4px;
    }
    .confirm-detail strong { color: #1a1a1a; }

    .confirm-note {
      width: 100%;
      padding: 12px;
      font-size: 14px;
      font-family: 'Montserrat', sans-serif;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      resize: vertical;
      min-height: 60px;
      margin-top: 6px;
      outline: none;
    }
    .confirm-note:focus { border-color: #006B3F; }

    .confirm-note-label {
      font-size: 12px;
      color: #888;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 16px;
      margin-bottom: 6px;
    }

    .inperson-check {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 16px;
      border: 2px solid #ddd;
      border-radius: 12px;
      cursor: pointer;
      margin: 16px 0;
      background: white;
      transition: border-color 0.15s, background 0.15s;
    }
    .inperson-check:hover {
      border-color: #006B3F;
      background: #f8faf9;
    }
    .inperson-check input[type="checkbox"] {
      width: 20px;
      height: 20px;
      margin: 2px 0 0 0;
      cursor: pointer;
      accent-color: #006B3F;
      flex-shrink: 0;
    }
    .inperson-check:has(input:checked) {
      border-color: #006B3F;
      background: #f0faf5;
    }
    .inperson-text { display: flex; flex-direction: column; gap: 3px; }
    .inperson-title {
      font-size: 14px;
      font-weight: 600;
      color: #1a1a1a;
      line-height: 1.3;
    }
    .inperson-sub {
      font-size: 12px;
      color: #777;
      line-height: 1.4;
    }

    .confirm-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }
    .confirm-actions .btn { flex: 1; }
    .btn-back {
      background: white;
      color: #666;
      border: 2px solid #ddd;
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(2px);
    }
    .modal-overlay.visible { display: flex; }

    .modal {
      background: white;
      border-radius: 20px;
      padding: 28px;
      margin: 20px;
      max-width: 340px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .modal h3 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .modal p {
      font-size: 14px;
      color: #666;
      margin-bottom: 24px;
      line-height: 1.5;
    }
    .modal-buttons { display: flex; gap: 10px; }
    .modal-buttons .btn { flex: 1; }

    .start-over { text-align: center; margin-top: 16px; }
    .start-over button {
      color: #999;
      font-size: 13px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px 16px;
      min-height: 44px;
      font-family: 'Montserrat', sans-serif;
    }
    .start-over button:hover { color: #555; }

    .toast {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: #006B3F;
      color: white;
      padding: 14px 24px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      z-index: 200;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
      max-width: 90%;
      text-align: center;
      animation: toastIn 0.3s ease;
    }
    .toast.error { background: #dc3545; }

    @keyframes toastIn {
      from { opacity: 0; transform: translateX(-50%) translateY(-20px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
  </style>
</head>
<body>

  <div class="portfolio-bar">
    <a href="../../index.html">&#8592; Back to portfolio</a>
    <span class="demo-badge">Interactive Demo</span>
  </div>

  <div class="header">
    <div class="logo-badge">
      <div class="logo-text"><span class="star">&#10022;</span>Pardes</div>
    </div>
    <h1>Pardes Day School</h1>
    <div class="subtitle">Parent-Teacher Conferences</div>
  </div>

  <div class="container">

    <!-- LOGIN -->
    <div id="screen-login" class="screen active">
      <div class="card">
        <div class="card-title">Welcome</div>
        <div id="login-error" class="alert-error" style="margin-bottom:18px;"></div>

        <div id="login-step-1">
          <div class="field">
            <label for="input-lastname">Family Last Name</label>
            <input type="text" id="input-lastname" placeholder="Last name" autocomplete="family-name" autocapitalize="words">
          </div>
          <div class="field">
            <label for="input-phone4">Last 4 Digits of Phone</label>
            <input type="tel" id="input-phone4" placeholder="4 digits" maxlength="4" inputmode="numeric" pattern="[0-9]*">
          </div>
          <button class="btn btn-primary" id="btn-login" onclick="handleLogin()">Find My Family</button>

          <div class="demo-shortcut">
            <div class="label">Demo shortcuts</div>
            <button type="button" onclick="demoSignIn('parent')">Sign in as demo family (Cohen)</button>
            <button type="button" onclick="demoSignIn('teacher')">Switch to teacher view (Mrs. Levi)</button>
            <button type="button" onclick="demoSignIn('admin')">Switch to admin view</button>
          </div>
        </div>

        <div id="login-step-fullphone" style="display:none;">
          <div class="field">
            <label for="input-fullphone">Full Phone Number</label>
            <input type="tel" id="input-fullphone" placeholder="Full phone number" inputmode="tel">
          </div>
          <button class="btn btn-primary" onclick="handleFullPhoneLogin()">Continue</button>
          <div class="start-over"><button type="button" onclick="resetLogin()">Start over</button></div>
        </div>
      </div>
    </div>

    <!-- DASHBOARD -->
    <div id="screen-dashboard" class="screen">
      <div class="welcome" id="welcome-msg"></div>
      <div class="welcome-sub" id="welcome-sub">Tap "Book" to schedule a conference</div>
      <div id="admin-section"></div>
      <div id="dashboard-content"></div>
      <div id="teacher-section"></div>
      <div class="signout"><button type="button" onclick="handleLogout()">Sign out</button></div>
    </div>

    <!-- SLOT PICKER -->
    <div id="screen-slots" class="screen">
      <button type="button" class="back-btn" onclick="showDashboard()">&#8592; Back</button>
      <div class="picker-header">

<script>
  /* =========================================================
     Demo data — fixed sample family + teachers + slot grid.
     Stays in memory; reloading the page resets state.
     ========================================================= */

  // Three demo dates (Mon May 11, Wed May 13, Thu May 14, 2026)
  var DEMO_DATES = [
    { date: '2026-05-11', label: 'Mon, May 11' },
    { date: '2026-05-13', label: 'Wed, May 13' },
    { date: '2026-05-14', label: 'Thu, May 14' }
  ];

  // Generate 4:00–5:00 PM slots in 15-min increments per teacher per date
  function buildSlotGrid() {
    var times = ['4:00 PM','4:15 PM','4:30 PM','4:45 PM','5:00 PM','5:15 PM'];
    var endMap = {'4:00 PM':'4:15 PM','4:15 PM':'4:30 PM','4:30 PM':'4:45 PM','4:45 PM':'5:00 PM','5:00 PM':'5:15 PM','5:15 PM':'5:30 PM'};
    var teachers = ['Mrs. Levi','Mrs. Rothman','Mr. Stein','Ms. Friedman','Mr. Cohen','Mrs. Klein','Mr. Berg','Ms. Goldberg','Mrs. Shapiro'];
    var grid = {};
    teachers.forEach(function(t) {
      grid[t] = [];
      DEMO_DATES.forEach(function(d) {
        times.forEach(function(time, i) {
          grid[t].push({
            slot_id: t + '|' + d.date + '|' + time,
            teacher_name: t,
            date: d.date,
            start_time: time,
            end_time: endMap[time],
            taken: false
          });
        });
      });
    });
    // Mark a couple of "taken" slots for realism
    var markTaken = [
      'Mrs. Levi|2026-05-11|4:30 PM',
      'Mrs. Levi|2026-05-13|4:00 PM',
      'Mr. Stein|2026-05-13|4:15 PM',
      'Ms. Friedman|2026-05-11|4:45 PM',
      'Mr. Cohen|2026-05-14|5:00 PM',
      'Ms. Goldberg|2026-05-13|4:30 PM' // pre-booked for David
    ];
    Object.keys(grid).forEach(function(t) {
      grid[t].forEach(function(s) {
        if (markTaken.indexOf(s.slot_id) !== -1) s.taken = true;
      });
    });
    return grid;
  }

  var SLOT_GRID = buildSlotGrid();

  var ROOMS = ['Room 12','Room 7','Room 14','Room 3','Library','Room 9','Room 21','Room 5','Room 17'];
  function roomFor(teacher) {
    var idx = Math.abs((teacher || '').split('').reduce(function(a, c) { return a + c.charCodeAt(0); }, 0)) % ROOMS.length;
    return ROOMS[idx];
  }

  var TEACHER_PHONES = {
    'Mrs. Levi':    '(216) 555-0101',
    'Mrs. Rothman': '(216) 555-0102',
    'Mr. Stein':    '(216) 555-0103',
    'Ms. Friedman': '(216) 555-0104',
    'Mr. Cohen':    '(216) 555-0105',
    'Mrs. Klein':   '(216) 555-0106',
    'Mr. Berg':     '(216) 555-0107',
    'Ms. Goldberg': '(216) 555-0108',
    'Mrs. Shapiro': '(216) 555-0109'
  };

  // Cohen family — 3 children, varied teachers

    family_id: 'cohen-001',
    family_name: 'Cohen Family',
    children: [
      { name: 'Alef',     grade: '1st', teachers: ['Mrs. Levi','Mrs. Rothman','Mr. Stein'] },
      { name: 'Shoshana', grade: '3rd', teachers: ['Ms. Friedman','Mr. Cohen','Mrs. Klein','Mr. Stein'] },
      { name: 'David',    grade: '5th', teachers: ['Mr. Berg','Ms. Goldberg','Mrs. Shapiro'] }
    ]
  };

  // In-memory bookings list. Pre-seed one so the cancel/reschedule UI is visible immediately.

    {

  // Other families that exist for the admin view (mocked)
  var OTHER_BOOKINGS = [
    { booking_id: 'bk-x1', teacher_name: 'Mrs. Levi',    student_name: 'Yael',    family_name: 'Friedman Family',

      parent_phone: '(216) 555-0212', parent_note: 'Wants to discuss reading progress.', conference_format: 'In-Person Requested' },

    { booking_id: 'bk-x3', teacher_name: 'Mr. Stein',    student_name: 'Eli',     family_name: 'Roth Family',

  /* =========================================================

  var currentRole = null;       // 'parent' | 'teacher' | 'admin'

  /* =========================================================

     ========================================================= */
  function el(id) { return document.getElementById(id); }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
    el('screen-' + id).classList.add('active');
    window.scrollTo(0, 0);
  }

  function formatDate(dateStr) {
    if (!dateStr) return '';
    try {
      var d = new Date(dateStr + 'T12:00:00');
      return new Intl.DateTimeFormat('en-US', { weekday: 'short', month: 'short', day: 'numeric' }).format(d);
    } catch (e) { return dateStr; }
  }
  function formatDateLong(dateStr) {
    if (!dateStr) return '';
    try {
      var d = new Date(dateStr + 'T12:00:00');
      return new Intl.DateTimeFormat('en-US', { weekday: 'long', month: 'long', day: 'numeric' }).format(d);
    } catch (e) { return dateStr; }
  }

  function showToast(msg, isError) {
    var existing = document.querySelector('.toast');
    if (existing) existing.remove();
    var t = document.createElement('div');
    t.className = 'toast' + (isError ? ' error' : '');
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(function() { t.remove(); }, 3500);
  }

  function showLoginError(msg) { var e = el('login-error'); e.textContent = msg; e.classList.add('visible'); }
  function hideLoginError() { el('login-error').classList.remove('visible'); el('login-error').textContent = ''; }

  /* =========================================================
     Login (demo: lenient)
     ========================================================= */
  function handleLogin() {
    var lastName = el('input-lastname').value.trim();
    var phone4 = el('input-phone4').value.trim();
    if (!lastName) { showLoginError('Please enter your last name.'); return; }
    if (!/^\d{4}$/.test(phone4)) { showLoginError('Please enter exactly 4 digits.'); return; }
    hideLoginError();
    // Step 2: full phone
    el('login-step-1').style.display = 'none';
    el('login-step-fullphone').style.display = 'block';
  }

  function handleFullPhoneLogin() {
    var fullPhone = el('input-fullphone').value.trim();
    if (!fullPhone || fullPhone.replace(/\D/g, '').length < 7) {
      showLoginError('Please enter your full phone number.');
      return;
    }
    hideLoginError();
    // Demo: any phone works → Cohen family
    demoSignIn('parent');
  }

  function demoSignIn(role) {
    currentRole = role;
    if (role === 'teacher') currentTeacherName = 'Mrs. Levi';
    else if (role === 'admin') currentTeacherName = null;
    showDashboard();
  }

  function handleLogout() {
    currentRole = null;
    currentTeacherName = null;
    resetLogin();
    showScreen('login');
  }

  function resetLogin() {
    el('login-step-1').style.display = 'block';
    el('login-step-fullphone').style.display = 'none';
    el('input-lastname').value = '';
    el('input-phone4').value = '';
    el('input-fullphone').value = '';
    hideLoginError();
  }

  /* =========================================================
     Dashboard rendering
     ========================================================= */
  function showDashboard() {
    showScreen('dashboard');
    var welcomeMsg = el('welcome-msg');
    var welcomeSub = el('welcome-sub');

    el('admin-section').textContent = '';
    el('dashboard-content').textContent = '';
    el('teacher-section').textContent = '';

    if (currentRole === 'admin') {
      welcomeMsg.textContent = 'Welcome, Admin';
      welcomeSub.textContent = 'Admin view \u2014 all scheduled conferences';
      renderAdminSection(allBookings());
    } else if (currentRole === 'teacher') {
      welcomeMsg.textContent = 'Welcome, ' + currentTeacherName;
      welcomeSub.textContent = "You're signed in as a teacher.";
      renderTeacherSection(currentTeacherName, bookingsForTeacher(currentTeacherName));
    } else {
      welcomeMsg.textContent = 'Welcome, ' + FAMILY.family_name;
      welcomeSub.textContent = 'Tap "Book" to schedule a conference';
      renderParentDashboard();
    }
  }

  function allBookings() {
    return BOOKINGS.concat(OTHER_BOOKINGS);
  }

  function bookingsForTeacher(teacherName) {
    return allBookings().filter(function(b) { return b.teacher_name === teacherName; })
      .sort(function(a, b) {
        if (a.date !== b.date) return a.date < b.date ? -1 : 1;
        return a.start_time < b.start_time ? -1 : 1;
      });
  }

  function renderParentDashboard() {
    var content = el('dashboard-content');
    FAMILY.children.forEach(function(child) {
      var card = document.createElement('div');
      card.className = 'child-card';

      var header = document.createElement('div');
      header.className = 'child-header';
      var cn = document.createElement('div'); cn.className = 'child-name'; cn.textContent = child.name;
      var cg = document.createElement('div'); cg.className = 'child-grade'; cg.textContent = 'Grade ' + child.grade;
      header.appendChild(cn); header.appendChild(cg);
      card.appendChild(header);

      child.teachers.forEach(function(teacher) {
        var bk = BOOKINGS.find(function(b) { return b.teacher_name === teacher && b.student_name === child.name; });
        var row = document.createElement('div'); row.className = 'teacher-row';
        var info = document.createElement('div'); info.className = 'teacher-info';
        var tn = document.createElement('div'); tn.className = 'teacher-name'; tn.textContent = teacher;
        info.appendChild(tn);

        if (bk) {
          var badge = document.createElement('div'); badge.className = 'booked-badge';
          badge.textContent = formatDate(bk.date) + ' at ' + bk.start_time;
          info.appendChild(badge);
          var acts = document.createElement('div'); acts.className = 'booking-actions';

          var rb = document.createElement('button'); rb.className = 'btn btn-resched'; rb.textContent = 'Reschedule';
          rb.addEventListener('click', (function(id, t, s) { return function() { handleReschedule(id, t, s); }; })(bk.booking_id, teacher, child.name));

          var cb = document.createElement('button'); cb.className = 'btn btn-cancel'; cb.textContent = 'Cancel';
          cb.addEventListener('click', (function(id, t, st, dt) { return function() { handleCancel(id, t, st, dt); }; })(bk.booking_id, teacher, bk.start_time, bk.date));

          acts.appendChild(rb); acts.appendChild(cb);
          info.appendChild(acts);
          row.appendChild(info);
        } else {
          row.appendChild(info);
          var bb = document.createElement('button'); bb.className = 'btn btn-book'; bb.textContent = 'Book';
          bb.addEventListener('click', (function(t, s) { return function() { openSlotPicker(t, s); }; })(teacher, child.name));
          row.appendChild(bb);
        }
        card.appendChild(row);
      });
      content.appendChild(card);
    });
  }

  function renderAdminSection(bookings) {
    var container = el('admin-section');
    container.textContent = '';

    var byDay = {};
    var inPersonCount = 0;
    bookings.forEach(function(b) {
      byDay[b.date] = (byDay[b.date] || 0) + 1;
      if (b.conference_format === 'In-Person Requested') inPersonCount++;
    });
    var days = Object.keys(byDay).sort();

    var stats = document.createElement('div');
    stats.className = 'admin-stats';
    [
      { num: bookings.length, label: 'Total' },
      { num: days.length, label: 'Days' },
      { num: inPersonCount, label: 'In-Person Req' }
    ].forEach(function(s) {
      var card = document.createElement('div');
      card.className = 'admin-stat-card';
      var n = document.createElement('div'); n.className = 'admin-stat-num'; n.textContent = s.num;
      var l = document.createElement('div'); l.className = 'admin-stat-label'; l.textContent = s.label;
      card.appendChild(n); card.appendChild(l);
      stats.appendChild(card);
    });
    container.appendChild(stats);

    if (!bookings.length) {
      var empty = document.createElement('div');
      empty.className = 'empty-teacher';
      empty.textContent = 'No bookings yet.';
      container.appendChild(empty);
      return;
    }

    days.forEach(function(date) {
      var header = document.createElement('div');
      header.className = 'admin-day-header';
      var dayBookings = bookings.filter(function(b) { return b.date === date; })

      header.textContent = formatDateLong(date) + '  \u00b7  ' + dayBookings.length + ' booking' + (dayBookings.length === 1 ? '' : 's');

      dayBookings.forEach(function(bk) {
        var card = document.createElement('div');
        card.className = 'admin-booking';

        var row1 = document.createElement('div');
        row1.className = 'row1';

        var teacher = document.createElement('span'); teacher.className = 'teacher'; teacher.textContent = bk.teacher_name;

        row1.appendChild(teacher);

        card.appendChild(row1);

        var details = document.createElement('div');
        details.className = 'details';
        details.textContent = bk.student_name + ' \u2014 ' + bk.family_name;

        if (bk.parent_phone) {
          var phone = document.createElement('div');
          phone.className = 'details';

          phone.appendChild(lbl);
          phone.appendChild(document.createTextNode(bk.parent_phone));

        if (bk.parent_note) {
          var note = document.createElement('div');
          note.className = 'admin-note';
          note.textContent = bk.parent_note;
          card.appendChild(note);
        }

        container.appendChild(card);
      });
    });
  }

  function renderTeacherSection(teacherName, bookings) {
    var container = el('teacher-section');
    container.textContent = '';

    var title = document.createElement('div');
    title.className = 'section-title';
    title.textContent = 'My conferences (' + teacherName + ')';
    container.appendChild(title);

    if (!bookings.length) {
      var empty = document.createElement('div');
      empty.className = 'empty-teacher';
      empty.textContent = 'No bookings yet. They will appear here as families book.';

  /* =========================================================
     Slot picker
     ========================================================= */
  function openSlotPicker(teacher, student, rescheduleId) {
    currentPickerTeacher = teacher;
    currentPickerStudent = student;
    currentPickerBookingId = rescheduleId || null;
    selectedSlotId = null;
    var cb = el('inperson-checkbox');
    if (cb) cb.checked = false;
    showScreen('slots');
    el('picker-teacher').textContent = teacher;
    el('picker-student').textContent = (currentPickerBookingId ? 'Reschedule for ' : 'Select a time for ') + student;
    el('confirm-panel').style.display = 'none';
    renderSlots(SLOT_GRID[teacher] || []);
  }

  function renderSlots(slots) {
    var content = el('slots-content');
    content.textContent = '';
    if (!slots || slots.length === 0) {
      var ns = document.createElement('div');
      ns.style.cssText = 'color:#999;font-size:15px;padding:32px 20px;text-align:center;background:white;border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,0.06);';
      ns.textContent = 'No available times for this teacher.';
      content.appendChild(ns);
      return;
    }

    var grouped = {};
    slots.forEach(function(s) {
      if (!grouped[s.date]) grouped[s.date] = [];
      grouped[s.date].push(s);
    });

    Object.keys(grouped).sort().forEach(function(date) {
      var g = document.createElement('div'); g.className = 'date-group';
      var lbl = document.createElement('div'); lbl.className = 'date-label';
      lbl.textContent = formatDateLong(date);
      g.appendChild(lbl);
      var grid = document.createElement('div'); grid.className = 'slots-grid';
      grouped[date].forEach(function(slot) {
        var btn = document.createElement('button');
        btn.className = 'slot-btn';
        btn.textContent = slot.start_time;
        btn.setAttribute('data-slot-id', slot.slot_id);
        if (slot.taken) {
          btn.disabled = true;
          btn.title = 'Taken';
        } else {
          btn.addEventListener('click', (function(sid, d, st, et) {
            return function() { handleBookSlot(sid, d, st, et); };
          })(slot.slot_id, slot.date, slot.start_time, slot.end_time));
        }
        grid.appendChild(btn);
      });
      g.appendChild(grid); content.appendChild(g);
    });
  }

  function handleBookSlot(slotId, date, time, endTime) {
    selectedSlotId = slotId;
    selectedSlotDate = date;
    selectedSlotTime = time;
    selectedSlotEnd = endTime;

    document.querySelectorAll('.slot-btn').forEach(function(b) { b.classList.remove('selected'); });
    var selected = document.querySelector('[data-slot-id="' + slotId + '"]');
    if (selected) selected.classList.add('selected');

    var details = el('confirm-details');
    details.textContent = '';

    var lines = [
      ['Teacher', currentPickerTeacher],
      ['Student', currentPickerStudent],
      ['Date', formatDateLong(date)],
      ['Time', time + ' \u2013 ' + endTime],
      ['Location', roomFor(currentPickerTeacher)]
    ];
    lines.forEach(function(pair) {
      var d = document.createElement('div');
      d.className = 'confirm-detail';
      var s = document.createElement('strong');
      s.textContent = pair[1];
      d.textContent = pair[0] + ': ';
      d.appendChild(s);
      details.appendChild(d);
    });

    el('confirm-note').value = '';
    el('btn-confirm-book').disabled = false;
    el('btn-confirm-book').textContent = currentPickerBookingId ? 'Confirm Reschedule' : 'Confirm Booking';

    el('confirm-panel').style.display = 'block';
    el('confirm-panel').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function clearSlotSelection() {
    selectedSlotId = null;
    document.querySelectorAll('.slot-btn').forEach(function(b) { b.classList.remove('selected'); });
    el('confirm-panel').style.display = 'none';
  }

  function confirmBooking() {
    if (!selectedSlotId) return;
    var inPerson = el('inperson-checkbox').checked;
    var note = el('confirm-note').value.trim();
    var formatLabel = inPerson ? 'In-Person Requested' : 'Phone Call';

    if (currentPickerBookingId) {
      // Reschedule: remove old booking, free old slot
      var old = BOOKINGS.find(function(b) { return b.booking_id === currentPickerBookingId; });
      if (old) {
        freeSlot(old.teacher_name, old.date, old.start_time);
        BOOKINGS = BOOKINGS.filter(function(b) { return b.booking_id !== currentPickerBookingId; });
      }
    }

    // Mark slot as taken
    var slot = (SLOT_GRID[currentPickerTeacher] || []).find(function(s) { return s.slot_id === selectedSlotId; });
    if (slot) slot.taken = true;

    BOOKINGS.push({
      booking_id: 'bk-' + Date.now(),
      teacher_name: currentPickerTeacher,
      student_name: currentPickerStudent,
      date: selectedSlotDate,
      start_time: selectedSlotTime,
      end_time: selectedSlotEnd,
      family_name: FAMILY.family_name,
      parent_phone: '(216) 555-0411',
      parent_note: note,
      conference_format: formatLabel
    });

    showToast(currentPickerBookingId ? 'Conference rescheduled' : 'Conference booked');
    showDashboard();
  }

  function freeSlot(teacher, date, time) {
    var list = SLOT_GRID[teacher] || [];
    list.forEach(function(s) {
      if (s.date === date && s.start_time === time) s.taken = false;
    });
  }

  /* =========================================================
     Cancel
     ========================================================= */
  function handleCancel(id, teacher, time, date) {
    pendingCancelId = id;
    el('cancel-modal-text').textContent = 'Cancel your conference with ' + teacher + ' on ' + formatDateLong(date) + ' at ' + time + '?';
    el('cancel-modal').classList.add('visible');
  }

  function closeCancelModal() {
    pendingCancelId = null;
    el('cancel-modal').classList.remove('visible');
  }

  function confirmCancel() {
    if (!pendingCancelId) return;
    var bk = BOOKINGS.find(function(b) { return b.booking_id === pendingCancelId; });
    if (bk) {
      freeSlot(bk.teacher_name, bk.date, bk.start_time);
      BOOKINGS = BOOKINGS.filter(function(b) { return b.booking_id !== pendingCancelId; });
    }
    closeCancelModal();
    showToast('Conference cancelled');
    showDashboard();
  }

  function handleReschedule(id, teacher, student) {
    openSlotPicker(teacher, student, id);
  }

  /* =========================================================
     Keyboard niceties
     ========================================================= */
  el('input-lastname').addEventListener('keydown', function(e) { if (e.key === 'Enter') el('input-phone4').focus(); });
  el('input-phone4').addEventListener('keydown', function(e) { if (e.key === 'Enter') handleLogin(); });
  el('input-phone4').addEventListener('input', function(e) { e.target.value = e.target.value.replace(/\D/g, ''); });
  el('input-fullphone').addEventListener('keydown', function(e) { if (e.key === 'Enter') handleFullPhoneLogin(); });
</script>
</body>
</html>
