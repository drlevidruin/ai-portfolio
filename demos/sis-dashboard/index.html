<html lang="en">

<title>SIS Dashboard Demo &middot; AI Inside a Small School</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --forest: #10653c;
    --forest-dark: #0a4a2b;
    --forest-soft: #b7e2c6;
    --navy: #343e85;
    --cream: #f8f4ed;
    --sage-light: #f0f4ee;
    --white: #ffffff;
    --text-dark: #1d1d1f;
    --text-body: #424245;
    --text-light: #86868b;
    --line: rgba(16, 101, 60, 0.14);
    --line-soft: rgba(0, 0, 0, 0.06);
    --amber: #d4940a;
    --warn: #b8620a;
    --danger: #8b2c1a;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: 'Montserrat', system-ui, -apple-system, sans-serif; background: #f7f7f5; color: var(--text-body); -webkit-font-smoothing: antialiased; min-height: 100vh; }
  h1, h2, h3, h4 { font-family: 'Montserrat', sans-serif; color: var(--text-dark); margin: 0; letter-spacing: -0.02em; }
  a { color: var(--forest); text-decoration: none; }
  button { font-family: inherit; }

  .topbar { background: var(--white); border-bottom: 1px solid var(--line-soft); padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
  .topbar .back { font-size: 13px; font-weight: 600; color: var(--forest); display: inline-flex; align-items: center; gap: 6px; }
  .topbar .back::before { content: "\2190"; }
  .topbar .logo { font-family: 'Caveat', cursive; color: var(--forest); font-size: 22px; font-weight: 600; }
  .topbar .demo-label { font-size: 11px; font-weight: 700; color: var(--forest); letter-spacing: 0.14em; text-transform: uppercase; padding: 5px 10px; border: 1px solid var(--line); border-radius: 999px; }

  .app { display: grid; grid-template-columns: 300px 1fr; height: calc(100vh - 49px); }

  /* Sidebar */
  .sidebar { background: var(--white); border-right: 1px solid var(--line-soft); overflow-y: auto; }
  .class-picker { padding: 18px 20px 14px; border-bottom: 1px solid var(--line-soft); }
  .class-picker .label { font-size: 10px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-light); margin-bottom: 6px; }
  .class-picker .class-name { font-size: 16px; color: var(--text-dark); font-weight: 700; }
  .class-picker .teacher { font-size: 12.5px; color: var(--text-body); margin-top: 2px; }
  .student-search { padding: 12px 20px; border-bottom: 1px solid var(--line-soft); }
  .student-search input { width: 100%; border: 1px solid var(--line-soft); border-radius: 10px; padding: 9px 12px; font-family: inherit; font-size: 13px; outline: none; background: #fafafa; }
  .student-search input:focus { border-color: var(--forest); background: white; }
  .student-list { padding: 8px; }
  .student-item { display: grid; grid-template-columns: 36px 1fr auto; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 10px; cursor: pointer; transition: background 0.12s ease; text-align: left; border: none; background: transparent; width: 100%; font-family: inherit; }
  .student-item:hover { background: var(--sage-light); }
  .student-item.active { background: var(--sage-light); }
  .student-item.active .name { color: var(--forest); }
  .avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, #10653c, #343e85); display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 13px; font-family: 'Montserrat', sans-serif; flex-shrink: 0; }
  .avatar.v1 { background: linear-gradient(135deg, #10653c, #343e85); }
  .avatar.v2 { background: linear-gradient(135deg, #0a4a2b, #10653c); }
  .avatar.v3 { background: linear-gradient(135deg, #343e85, #0a4a2b); }
  .avatar.v4 { background: linear-gradient(135deg, #d4940a, #10653c); }
  .avatar.v5 { background: linear-gradient(135deg, #8b2c1a, #343e85); }
  .student-item .name { font-size: 13.5px; font-weight: 600; color: var(--text-dark); }
  .student-item .sub { font-size: 11px; color: var(--text-light); margin-top: 1px; }
  .flag { font-size: 10px; font-weight: 700; padding: 3px 6px; border-radius: 5px; letter-spacing: 0.06em; }
  .flag.good { background: #e7f4ec; color: var(--forest); }
  .flag.watch { background: #fdf3e1; color: var(--warn); }

  /* Main */
  .main { overflow-y: auto; padding: 20px 28px 60px; }

  .student-header { display: flex; align-items: center; gap: 18px; padding: 18px 22px; background: white; border: 1px solid var(--line-soft); border-radius: 16px; margin-bottom: 16px; }
  .student-header .avatar { width: 52px; height: 52px; font-size: 18px; }
  .student-header .name { font-size: 22px; font-weight: 800; color: var(--text-dark); letter-spacing: -0.02em; }
  .student-header .meta { font-size: 13px; color: var(--text-light); margin-top: 2px; }
  .quick-stats { margin-left: auto; display: flex; gap: 24px; }
  .quick-stats .q .n { font-size: 20px; font-weight: 800; color: var(--forest); line-height: 1; letter-spacing: -0.02em; }
  .quick-stats .q .l { font-size: 10.5px; color: var(--text-light); margin-top: 4px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; }

  /* AI Summary */
  .ai-card { background: linear-gradient(180deg, #ffffff 0%, #f5faf2 100%); border: 1px solid rgba(16, 101, 60, 0.3); border-radius: 16px; padding: 20px 22px; margin-bottom: 16px; position: relative; }
  .ai-card::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--forest); border-radius: 4px 0 0 4px; }
  .ai-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 10px; }
  .ai-head .title { display: inline-flex; align-items: center; gap: 10px; font-size: 13px; font-weight: 700; color: var(--forest-dark); letter-spacing: 0.04em; text-transform: uppercase; }
  .ai-badge { background: var(--forest); color: white; padding: 3px 8px; border-radius: 999px; font-size: 10px; font-weight: 800; letter-spacing: 0.08em; }
  .ai-date { font-size: 11px; color: var(--text-light); font-weight: 600; }
  .ai-body { font-size: 15px; color: var(--text-dark); line-height: 1.55; }

  /* Card grid */
  .grid { display: grid; grid-template-columns: 1.1fr 1fr; gap: 16px; margin-bottom: 16px; }
  .grid.three { grid-template-columns: repeat(3, 1fr); }
  .panel { background: white; border: 1px solid var(--line-soft); border-radius: 14px; padding: 18px 20px; }
  .panel-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .panel-head h3 { font-size: 13px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-light); }
  .panel-head .src { font-size: 10.5px; font-weight: 600; color: var(--forest); display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; background: var(--sage-light); border-radius: 999px; }
  .panel-head .src::before { content: "\2192"; }

  /* Subject grades */
  .subject-row { display: grid; grid-template-columns: 1fr auto auto; align-items: center; gap: 12px; padding: 8px 0; border-bottom: 1px solid var(--line-soft); font-size: 14px; }
  .subject-row:last-child { border-bottom: none; }
  .subject-row .sub-name { color: var(--text-dark); font-weight: 500; }
  .subject-row .trend { font-size: 11px; color: var(--text-light); font-weight: 600; }
  .subject-row .trend.up { color: var(--forest); }
  .subject-row .trend.down { color: var(--danger); }
  .grade-pill { font-size: 12px; font-weight: 800; padding: 3px 10px; border-radius: 8px; letter-spacing: 0.02em; min-width: 40px; text-align: center; font-family: 'Montserrat', sans-serif; }
  .g-a { background: #e7f4ec; color: var(--forest-dark); }
  .g-b { background: #e8edf5; color: var(--navy); }
  .g-c { background: #fdf3e1; color: var(--warn); }
  .g-d { background: #f5e1dd; color: var(--danger); }

  /* Kriah progress */
  .kriah-level { font-size: 15px; color: var(--text-dark); font-weight: 600; margin-bottom: 2px; }
  .kriah-sub { font-size: 12px; color: var(--text-light); margin-bottom: 14px; }
  .progress-bar { height: 8px; background: var(--sage-light); border-radius: 999px; overflow: hidden; margin-bottom: 6px; }
  .progress-bar .fill { height: 100%; background: var(--forest); border-radius: 999px; transition: width 0.6s ease; }
  .progress-row { display: flex; justify-content: space-between; font-size: 11.5px; color: var(--text-light); font-weight: 600; }
  .progress-group { margin-bottom: 14px; }
  .progress-group:last-child { margin-bottom: 0; }
  .progress-group .label { font-size: 11px; color: var(--text-body); font-weight: 600; margin-bottom: 6px; letter-spacing: 0.04em; text-transform: uppercase; }
  .kriah-chart { margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--line-soft); }
  .kriah-chart .mini-label { font-size: 10.5px; color: var(--text-light); font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 8px; }
  .spark { width: 100%; height: 50px; display: block; }

  /* Observations */
  .obs-item { padding: 12px 0; border-bottom: 1px solid var(--line-soft); }
  .obs-item:last-child { border-bottom: none; }
  .obs-head { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-light); font-weight: 600; margin-bottom: 4px; }
  .obs-head .teacher { color: var(--forest-dark); font-weight: 700; }
  .obs-text { font-size: 13.5px; color: var(--text-dark); line-height: 1.5; }

  /* Attendance */
  .attend-big { font-size: 36px; font-weight: 800; color: var(--forest); letter-spacing: -0.03em; line-height: 1; }
  .attend-sub { font-size: 12px; color: var(--text-light); font-weight: 600; margin-top: 4px; letter-spacing: 0.04em; }
  .attend-dots { display: grid; grid-template-columns: repeat(20, 1fr); gap: 3px; margin-top: 16px; }
  .attend-dots .d { aspect-ratio: 1; border-radius: 3px; background: var(--sage-light); }
  .attend-dots .d.here { background: var(--forest); }
  .attend-dots .d.absent { background: var(--danger); opacity: 0.55; }
  .attend-dots .d.late { background: var(--amber); opacity: 0.75; }
  .legend { display: flex; gap: 14px; margin-top: 10px; font-size: 10.5px; color: var(--text-light); font-weight: 600; }
  .legend .chip { display: inline-flex; align-items: center; gap: 5px; }
  .legend .dot { width: 8px; height: 8px; border-radius: 2px; }

  /* Math (Waggle) */
  .waggle-top { display: flex; align-items: flex-end; gap: 12px; margin-bottom: 10px; }
  .waggle-num { font-size: 30px; font-weight: 800; color: var(--forest); letter-spacing: -0.02em; line-height: 1; }
  .waggle-sub { font-size: 12px; color: var(--text-light); font-weight: 600; padding-bottom: 4px; }
  .waggle-gain { display: inline-flex; align-items: center; gap: 5px; background: #e7f4ec; color: var(--forest-dark); padding: 4px 10px; border-radius: 999px; font-size: 11.5px; font-weight: 700; margin-bottom: 12px; }
  .waggle-gain::before { content: "\2191"; font-weight: 800; }
  .waggle-detail { font-size: 12.5px; color: var(--text-body); line-height: 1.55; }

  /* Connected systems */
  .systems-card { background: white; border: 1px solid var(--line-soft); border-radius: 14px; padding: 18px 20px; margin-top: 4px; }
  .systems-card h3 { font-size: 13px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-light); margin-bottom: 14px; }
  .systems-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
  .sys { text-align: center; padding: 14px 10px; border: 1px solid var(--line-soft); border-radius: 10px; background: #fafbfa; }
  .sys-icon { width: 36px; height: 36px; margin: 0 auto 8px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-weight: 800; color: white; font-size: 12px; }
  .sys-1 { background: linear-gradient(135deg, #10653c, #343e85); }
  .sys-2 { background: linear-gradient(135deg, #d4940a, #10653c); }
  .sys-3 { background: linear-gradient(135deg, #343e85, #10653c); }
  .sys-4 { background: linear-gradient(135deg, #0a4a2b, #343e85); }
  .sys-5 { background: linear-gradient(135deg, #343e85, #d4940a); }
  .sys-name { font-size: 12px; font-weight: 700; color: var(--text-dark); }
  .sys-role { font-size: 10.5px; color: var(--text-light); margin-top: 2px; font-weight: 500; }

  /* Ask SIS */
  .ask-card { background: linear-gradient(135deg, #0a4a2b 0%, #10653c 100%); color: white; border-radius: 16px; padding: 20px 22px; margin-bottom: 16px; }
  .ask-card h3 { color: white; font-size: 16px; margin-bottom: 4px; }
  .ask-card .sub { font-size: 12.5px; color: rgba(255,255,255,0.8); margin-bottom: 14px; }
  .ask-input-wrap { display: flex; gap: 8px; }
  .ask-input-wrap input { flex: 1; border: none; border-radius: 10px; padding: 10px 14px; font-family: inherit; font-size: 14px; outline: none; background: rgba(255,255,255,0.95); color: var(--text-dark); }
  .ask-input-wrap button { background: white; color: var(--forest-dark); border: none; border-radius: 10px; padding: 10px 18px; font-weight: 700; cursor: pointer; font-size: 13.5px; }
  .ask-input-wrap button:hover { background: var(--forest-soft); }
  .ask-suggestions { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 6px; }
  .ask-sugg { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25); color: white; padding: 5px 10px; border-radius: 999px; font-size: 11.5px; cursor: pointer; font-family: inherit; font-weight: 500; }
  .ask-sugg:hover { background: rgba(255,255,255,0.25); }
  .ask-answer { margin-top: 14px; padding: 14px; background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2); border-radius: 10px; font-size: 13.5px; line-height: 1.55; display: none; }
  .ask-answer.show { display: block; animation: slideDown 0.3s ease; }
  @keyframes slideDown { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: none; } }
  .ask-answer strong { color: var(--forest-soft); font-weight: 700; }

  @media (max-width: 900px) {
    .app { grid-template-columns: 1fr; height: auto; }
    .sidebar { max-height: 260px; }
    .grid, .grid.three { grid-template-columns: 1fr; }
    .systems-grid { grid-template-columns: repeat(2, 1fr); }
    .student-header { flex-wrap: wrap; }
    .quick-stats { margin-left: 0; width: 100%; }
  }
</style>
</head>

  function generateAttendance(pct, absenceClusters) {
    // Generate 60-day attendance grid
    const days = 60;
    const targetAbsences = Math.round(days * (1 - pct / 100));
    const arr = new Array(days).fill('here');
    let placed = 0;
    while (placed < targetAbsences) {
      const i = Math.floor(Math.random() * days);
      if (arr[i] === 'here') { arr[i] = Math.random() < 0.15 ? 'late' : 'absent'; placed++; }
    }
    return arr;
  }

      empty.textContent = 'No students match.';

    }
    matches.forEach(s => {

  function progressGroup(label, value, max) {

    g.appendChild(lb); g.appendChild(bar); g.appendChild(row);
    return g;
  }

  function sparkline(data) {
    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('class', 'spark');
    svg.setAttribute('viewBox', '0 0 200 50');
    svg.setAttribute('preserveAspectRatio', 'none');
    const min = Math.min.apply(null, data) - 5;
    const max = Math.max.apply(null, data) + 2;
    const range = Math.max(1, max - min);
    const step = 200 / (data.length - 1);
    let d = '';
    data.forEach((v, i) => {
      const x = i * step;
      const y = 50 - ((v - min) / range) * 45 - 2;
      d += (i === 0 ? 'M' : ' L') + x + ',' + y;
    });
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', d);
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke', '#10653c');
    path.setAttribute('stroke-width', '2.5');
    path.setAttribute('stroke-linecap', 'round');
    path.setAttribute('stroke-linejoin', 'round');
    // Last point dot
    const last = data[data.length - 1];
    const lx = (data.length - 1) * step;
    const ly = 50 - ((last - min) / range) * 45 - 2;
    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    circle.setAttribute('cx', lx); circle.setAttribute('cy', ly); circle.setAttribute('r', '3.5'); circle.setAttribute('fill', '#10653c');
    svg.appendChild(path); svg.appendChild(circle);
    return svg;
  }

  function buildAskCard() {
    const c = document.createElement('div'); c.className = 'ask-card';

    const sugg = document.createElement('div'); sugg.className = 'ask-suggestions';

      'Who is struggling with kriah?',
      'Who is ready for enrichment?',

    const answerBox = document.createElement('div'); answerBox.className = 'ask-answer';

    function runQuery(q) {
      const ql = q.toLowerCase();
      let answer = '';
      if (/struggl|behind|low/.test(ql) && /kriah|reading/.test(ql)) {
        const list = STUDENTS.filter(x => x.fluency < 70).map(x => x.name + ' (' + x.fluency + '%)').join(', ');

      } else if (/enrich|challenge|ahead|advanced|top/.test(ql)) {
        const enrichmentIds = ['dalet', 'tet', 'zayin'];
        const top = STUDENTS.filter(x => enrichmentIds.includes(x.id)).map(x => x.name).join(', ');
        answer = 'Three students are ready for more challenge: ' + top + '. Dalet and Tet are nearly a full grade level above on Waggle math. Consider enrichment groupings this week.';
      } else if (/absent|absence|missed|attendance/.test(ql)) {
        const low = STUDENTS.filter(x => x.attendance < 92).sort((a,b) => a.attendance - b.attendance).map(x => x.name + ' (' + x.attendance + '%)').join(', ');
        answer = 'Students below 92 percent attendance: ' + low + '. Vav has been out three times in the last month, all on Fridays. Worth a parent outreach.';
      } else if (/class|overall|this week|summary|week/.test(ql)) {
        answer = 'Class of 10. Average kriah fluency is 80 percent, up 5 points since last month. Math average on Waggle is grade 2.5, with a +0.7 grade-level gain across the class. Two students flagged for intervention (Gimmel, Vav). Three students ready for enrichment (Dalet, Tet, Zayin). Chumash discussions were especially strong on Tuesday.';
      } else {
        answer = 'I searched the connected systems. The class looks healthy overall, 80 percent average kriah fluency and grade 2.5 on Waggle. Try one of the suggested questions for a more specific answer.';
      }
      answerBox.textContent = '';
      const prefix = document.createElement('strong');
      prefix.textContent = 'Answer: ';
      answerBox.appendChild(prefix);
      answerBox.appendChild(document.createTextNode(answer));
      answerBox.classList.add('show');
    }
    btn.addEventListener('click', () => runQuery(inp.value || questions[0]));
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') runQuery(inp.value || questions[0]); });
    c.appendChild(h); c.appendChild(s); c.appendChild(wrap); c.appendChild(sugg); c.appendChild(answerBox);
    return c;
  }
